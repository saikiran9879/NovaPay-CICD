apiVersion: apps/v1
kind: Deployment

metadata:
  name: novapay-blue
  namespace: novapay

spec:
  replicas: 2

  selector:
    matchLabels:
      app: novapay
      version: blue

  template:

    metadata:
      labels:
        app: novapay
        version: blue

    spec:

      containers:

      - name: novapay

        image: saikiran9068/novapay:v1

        ports:
        - containerPort: 8080